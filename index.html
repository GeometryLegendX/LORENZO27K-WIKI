<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lorenzo27K Hub</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#3bd1ff,#0059ff);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Main container */
.menu{
    display:flex;
    align-items:center;
    gap:80px;
}

/* GD Icon Button */
.bigButton{
    width:260px;
    height:120px;
    background:#ffaa00;
    border:6px solid #000;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
    text-decoration:none;
    color:black;
    box-shadow:0 8px 0 #b56b00;
    transition:0.12s;
}

.bigButton:hover{
    transform:translateY(4px);
    box-shadow:0 4px 0 #b56b00;
}

/* Side Panel */
.side{
    width:300px;
    background:#ffe9a6;
    border:5px solid black;
    border-radius:12px;
    padding:20px;
    box-shadow:0 5px 0 #d4b574;
}

.side h2{
    margin-top:0;
    border-bottom:2px solid #000;
}

.linkButton{
    display:block;
    background:#00ff6a;
    border:4px solid black;
    padding:12px;
    margin-top:15px;
    text-align:center;
    text-decoration:none;
    color:black;
    font-weight:bold;
    border-radius:10px;
    box-shadow:0 5px 0 #17913d;
}

.linkButton:hover{
    transform:translateY(3px);
    box-shadow:0 3px 0 #17913d;
}
</style>
</head>

<body>

<div class="menu">

<a class="bigButton" href="links.html">CONTENT</a>

<div class="side">
<h2>Navigation</h2>

<a class="linkButton" href="wiki.html">Wiki</a>

<h2>About</h2>
<p>
This website is a fan-made hub dedicated to the Geometry Dash creator  
<b>Lorenzo27K</b>. Check out his links, wiki, and achievements!
</p>
</div>

</div>

</body>
</html>
